<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ My Wishlist ✨</title>

<style>

/* =======================
   BODY
======================= */

body{
    margin:0;
    padding:40px 20px;
    font-family:Arial, sans-serif;
    text-align:center;

    background:linear-gradient(
        -45deg,
        #f3e8ff,
        #e9d5ff,
        #f5d0fe,
        #ddd6fe
    );

    background-size:400% 400%;
    animation:bgmove 12s ease infinite;
}

/* Moving Background */

@keyframes bgmove{
    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* =======================
   SPARKLES
======================= */

.sparkles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;

    background-image:
    radial-gradient(circle,#ffffff 1px,transparent 1px);

    background-size:50px 50px;

    opacity:0.3;

    animation:sparkleMove 20s linear infinite;
}

@keyframes sparkleMove{
    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-200px);
    }
}

/* =======================
   TITLE
======================= */

h1{
    color:#7e22ce;
    margin-bottom:30px;
    font-size:40px;

    animation:float 3s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }
}

/* =======================
   CARD
======================= */

.card{

    width:320px;
    margin:25px auto;
    padding:20px;

    border-radius:25px;

    background:rgba(255,255,255,0.4);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.4);

    box-shadow:0 8px 20px rgba(0,0,0,0.1);

    transition:0.5s;

    overflow:hidden;
}

.card:hover{

    transform:
    translateY(-15px)
    rotateX(5deg)
    rotateY(5deg);

    box-shadow:
    0 25px 50px rgba(126,34,206,0.25);
}

/* =======================
   PRODUCT IMAGE
======================= */

.card img{

    width:100%;
    border-radius:15px;

    transition:0.5s;
}

.card:hover img{

    transform:scale(1.08);
}

/* =======================
   PRODUCT NAME
======================= */

.product-name{

    margin:15px 0;

    font-size:20px;
    font-weight:bold;

    color:#6b21a8;
}

/* =======================
   BUTTON
======================= */

.btn{

    display:block;

    text-decoration:none;

    color:white;

    background:#c084fc;

    padding:12px;

    border-radius:12px;

    font-weight:bold;

    transition:0.3s;
}

.btn:hover{

    background:#9333ea;

    transform:scale(1.05);

    box-shadow:
    0 0 15px #c084fc,
    0 0 30px #c084fc;
}

/* =======================
   MOBILE
======================= */

@media(max-width:500px){

    .card{
        width:90%;
    }

    h1{
        font-size:32px;
    }
}

</style>
</head>

<body>

<div class="sparkles"></div>

<h1>✨ My Wishlist ✨</h1>
