<!DOCTYPE html>
<html>
<head>
  <title>My Wishlist</title>

  <style>

    body{
      background-color:#f3e8ff;
      font-family:Arial;
      text-align:center;
      padding:40px;
    }

    h1{
      color:#7e22ce;
      margin-bottom:30px;
    }

    .card{
      background:white;
      width:320px;
      margin:25px auto;
      padding:20px;
      border-radius:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      border-radius:15px;
    }

    .product-name{
      font-size:20px;
      margin:15px 0;
      color:#7e22ce;
      font-weight:bold;
    }

    .btn{
      display:block;
      background:#c084fc;
      color:white;
      text-decoration:none;
      margin-top:15px;
      padding:12px;
      border-radius:10px;
      font-weight:bold;
    }

    .btn:hover{
      background:#9333ea;
    }

  </style>
</head>

<body>

  <h1>✨ My Wishlist ✨</h1>


  <!-- PRODUCT 1 -->
  <div class="card">

    <img src="wax.jpg" alt="Wax Seal Kit">

    <div class="product-name">
      🕯️ Wax Seal Kit 💌✨🌙
    </div>

    <a class="btn"
       href="https://amzn.to/4u8bxPL"
       target="_blank">
       click here for link
    </a>

  </div>


  <!-- PRODUCT 2 -->
  <div class="card">

    <img src="unicorn diary.jpg" alt="Unicorn Journal">

    <div class="product-name">
      🦄 Unicorn Journal Diary ✨📖🌈
    </div>

    <a class="btn"
       href="https://amzn.to/4wokLIY"
       target="_blank">
    click here for link
    </a>

  </div>


  <!-- PRODUCT 3 -->
  <div class="card">

    <img src="stickers.jpg" alt="Mini Stickers">

    <div class="product-name">
      🎀 Mini Stickers 🌸⭐🧸
    </div>

    <a class="btn"
       href="https://amzn.to/4tl5Vk4"
       target="_blank">
       click here for link
    </a>

  </div>

</body>
</html>
